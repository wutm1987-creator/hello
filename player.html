<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>正在播放 - FreeMusic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0a14;
            --bg-medium: #12122a;
            --bg-light: #1a1a3e;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --accent-glow: rgba(233, 69, 96, 0.25);
            --text-primary: #ffffff;
            --text-secondary: #7777aa;
            --text-dim: #555577;
            --success: #2ecc71;
            --border-color: rgba(255,255,255,0.06);
        }

        body {
            font-family: 'Microsoft YaHei UI', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* ===== 背景模糊封面 ===== */
        .bg-blur {
            position: fixed;
            top: -60px; left: -60px; right: -60px; bottom: -60px;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blur img {
            width: 120%;
            height: 120%;
            object-fit: cover;
            filter: blur(50px) brightness(0.35) saturate(1.3);
            transform: scale(1.1);
        }

        .bg-blur::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10,10,20,0.3) 0%, rgba(10,10,20,0.7) 60%, rgba(10,10,20,0.95) 100%);
        }

        /* ===== 主容器 ===== */
        .player-page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶部栏 ===== */
        .player-top-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top, 0px));
            position: relative;
            z-index: 10;
        }

        .btn-back {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .btn-back:active {
            background: rgba(233,69,96,0.3);
            transform: scale(0.92);
        }

        .top-bar-center {
            flex: 1;
            text-align: center;
        }

        .top-bar-center .label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .top-bar-center .title {
            font-size: 14px;
            font-weight: 600;
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
            margin-inline: auto;
        }

        .btn-share {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .btn-share:active {
            background: rgba(233,69,96,0.3);
            transform: scale(0.92);
        }

        /* ===== 黑胶唱片 ===== */
        .disc-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        .disc-container {
            position: relative;
            width: 280px;
            height: 280px;
        }

        /* 唱针 */
        .needle {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(-25deg);
            transform-origin: 50% 15px;
            z-index: 20;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .needle.playing {
            transform: translateX(-50%) rotate(0deg);
        }

        .needle-arm {
            width: 4px;
            height: 70px;
            background: linear-gradient(180deg, #888, #666);
            border-radius: 2px;
            margin-left: 12px;
        }

        .needle-head {
            width: 16px;
            height: 16px;
            background: #aaa;
            border-radius: 50%;
            position: absolute;
            top: -4px;
            left: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .needle-base {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #999, #666);
            border-radius: 50%;
            position: absolute;
            top: -6px;
            left: 4px;
            z-index: 1;
        }

        /* 唱片 */
        .disc {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            position: relative;
            animation: discSpin 20s linear infinite;
            animation-play-state: paused;
        }

        .disc.spinning {
            animation-play-state: running;
        }

        @keyframes discSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .disc-outer {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #111 0deg, #1a1a1a 30deg,
                #111 60deg, #1a1a1a 90deg,
                #111 120deg, #1a1a1a 150deg,
                #111 180deg, #1a1a1a 210deg,
                #111 240deg, #1a1a1a 270deg,
                #111 300deg, #1a1a1a 330deg,
                #111 360deg
            );
            position: relative;
            box-shadow: 0 0 0 8px #0a0a0a, 0 0 40px rgba(0,0,0,0.6);
        }

        /* 唱片纹路 */
        .disc-outer::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 3px,
                rgba(255,255,255,0.03) 3px,
                rgba(255,255,255,0.03) 4px
            );
        }

        /* 唱片封面（中心圆） */
        .disc-cover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55%;
            height: 55%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .disc-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .disc-cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background: linear-gradient(135deg, var(--bg-light), var(--bg-medium));
        }

        /* 中心孔 */
        .disc-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid #333;
            z-index: 5;
        }

        /* ===== 歌曲信息 ===== */
        .song-info {
            text-align: center;
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .song-info .song-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-info .song-artist {
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-info .song-artist .source-tag {
            display: inline-block;
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent);
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ===== 进度条 ===== */
        .progress-section {
            padding: 0 24px;
            margin-bottom: 16px;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 28px;
            background: transparent;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }

        .progress-track {
            position: absolute;
            left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            transition: height 0.15s;
        }

        .progress-bar-wrap:hover .progress-track,
        .progress-bar-wrap.dragging .progress-track {
            height: 5px;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: height 0.15s;
        }

        .progress-bar-wrap:hover .progress-fill,
        .progress-bar-wrap.dragging .progress-fill {
            height: 5px;
        }

        .progress-thumb {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px rgba(233,69,96,0.5);
            left: 0%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .progress-bar-wrap:hover .progress-thumb,
        .progress-bar-wrap.dragging .progress-thumb {
            opacity: 1;
        }

        .progress-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ===== 控制按钮 ===== */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .ctrl-btn {
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            transform: scale(0.88);
        }

        .ctrl-btn.mode-btn {
            width: 44px;
            height: 44px;
            font-size: 18px;
            color: var(--text-dim);
        }

        .ctrl-btn.mode-btn.active {
            color: var(--accent);
        }

        .ctrl-btn.prev-btn {
            width: 52px;
            height: 52px;
            font-size: 28px;
            margin: 0 8px;
        }

        .ctrl-btn.play-main {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            font-size: 28px;
            margin: 0 16px;
            box-shadow: 0 4px 20px var(--accent-glow);
            position: relative;
        }

        .ctrl-btn.play-main::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(233,69,96,0.2);
        }

        .ctrl-btn.play-main:active {
            transform: scale(0.92);
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .ctrl-btn.next-btn {
            width: 52px;
            height: 52px;
            font-size: 28px;
            margin: 0 8px;
        }

        .ctrl-btn.vol-btn {
            width: 44px;
            height: 44px;
            font-size: 18px;
            color: var(--text-dim);
        }

        /* ===== 底部操作栏 ===== */
        .player-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 0 24px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-item:active {
            transform: scale(0.9);
        }

        .action-item:hover {
            color: var(--text-primary);
        }

        .action-item .icon {
            font-size: 22px;
        }

        .action-item .label {
            font-size: 10px;
        }

        .action-item.dl-action:hover {
            color: var(--success);
        }

        /* ===== 音量滑块 ===== */
        .volume-slider-wrap {
            display: none;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px 20px;
            z-index: 50;
            width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .volume-slider-wrap.show {
            display: block;
        }

        .volume-slider-wrap .vol-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-align: center;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ===== 播放列表抽屉 ===== */
        .playlist-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 55vh;
            background: rgba(18,18,42,0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            z-index: 60;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .playlist-drawer.show {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-header .drawer-title {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
        }

        .drawer-header .drawer-count {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }

        .drawer-close {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .drawer-item:active {
            background: rgba(255,255,255,0.05);
        }

        .drawer-item.active {
            color: var(--accent);
        }

        .drawer-item.active .item-index {
            color: var(--accent);
        }

        .drawer-item .item-index {
            width: 24px;
            font-size: 13px;
            color: var(--text-dim);
            text-align: center;
            flex-shrink: 0;
        }

        .drawer-item .item-info {
            flex: 1;
            min-width: 0;
        }

        .drawer-item .item-title {
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drawer-item .item-artist {
            font-size: 12px;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drawer-item .item-source {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(233,69,96,0.1);
            color: var(--accent);
            flex-shrink: 0;
        }

        /* ===== 遮罩 ===== */
        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 55;
        }

        .drawer-overlay.show {
            display: block;
        }

        /* ===== Loading ===== */
        .player-loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 20, 0.6);
            z-index: 70;
            justify-content: center;
            align-items: center;
        }

        .player-loading.active {
            display: flex;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .disc-container { width: 240px; height: 240px; }
            .disc { width: 240px; height: 240px; }
            .song-info .song-title { font-size: 18px; }
            .ctrl-btn.play-main { width: 56px; height: 56px; font-size: 24px; }
        }

        @media (max-height: 700px) {
            .disc-container { width: 220px; height: 220px; }
            .disc { width: 220px; height: 220px; }
            .song-info { margin-bottom: 12px; }
            .progress-section { margin-bottom: 10px; }
            .player-controls { margin-bottom: 10px; }
        }

        @media (max-height: 600px) {
            .disc-container { width: 180px; height: 180px; }
            .disc { width: 180px; height: 180px; }
            .needle-arm { height: 50px; }
            .song-info .song-title { font-size: 16px; }
            .song-info .song-artist { font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- 模糊背景 -->
    <div class="bg-blur" id="bgBlur">
        <img src="" alt="" id="bgImg" style="display:none">
    </div>

    <div class="player-page">
        <!-- 顶部栏 -->
        <div class="player-top-bar">
            <button class="btn-back" onclick="goBack()">▾</button>
            <div class="top-bar-center">
                <div class="label">正在播放</div>
                <div class="title" id="topTitle">-</div>
            </div>
            <button class="btn-share" onclick="togglePlaylist()">☰</button>
        </div>

        <!-- 黑胶唱片 -->
        <div class="disc-area">
            <div class="disc-container">
                <!-- 唱针 -->
                <div class="needle" id="needle">
                    <div class="needle-base"></div>
                    <div class="needle-head"></div>
                    <div class="needle-arm"></div>
                </div>
                <!-- 唱片 -->
                <div class="disc" id="disc">
                    <div class="disc-outer">
                        <div class="disc-cover" id="discCover">
                            <div class="disc-cover-placeholder">🎵</div>
                        </div>
                        <div class="disc-hole"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 歌曲信息 -->
        <div class="song-info">
            <div class="song-title" id="playerTitle">等待播放...</div>
            <div class="song-artist">
                <span id="playerArtist">-</span>
                <span class="source-tag" id="playerSource">-</span>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-section">
            <div class="progress-bar-wrap" id="progressBar">
                <div class="progress-track"></div>
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-thumb" id="progressThumb"></div>
            </div>
            <div class="progress-times">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="player-controls">
            <button class="ctrl-btn mode-btn" id="modeBtn" onclick="togglePlayMode()">🔁</button>
            <button class="ctrl-btn prev-btn" onclick="sendCmd('prev')">⏮</button>
            <button class="ctrl-btn play-main" onclick="togglePlay()" id="playBtn">▶</button>
            <button class="ctrl-btn next-btn" onclick="sendCmd('next')">⏭</button>
            <button class="ctrl-btn vol-btn" onclick="toggleVolume()">🔊</button>
        </div>

        <!-- 底部操作 -->
        <div class="player-actions">
            <button class="action-item" onclick="toggleLike()" id="likeBtn">
                <span class="icon">♡</span>
                <span class="label">喜欢</span>
            </button>
            <button class="action-item dl-action" onclick="sendCmd('download')">
                <span class="icon">⬇</span>
                <span class="label">下载</span>
            </button>
            <button class="action-item" onclick="togglePlaylist()">
                <span class="icon">☰</span>
                <span class="label">列表</span>
            </button>
        </div>
    </div>

    <!-- 音量滑块 -->
    <div class="volume-slider-wrap" id="volumeWrap">
        <div class="vol-label">音量</div>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>

    <!-- 播放列表抽屉 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="togglePlaylist()"></div>
    <div class="playlist-drawer" id="playlistDrawer">
        <div class="drawer-header">
            <span class="drawer-title">播放列表</span>
            <span class="drawer-count" id="playlistCount">0首</span>
            <button class="drawer-close" onclick="togglePlaylist()">✕</button>
        </div>
        <div class="drawer-list" id="playlistList"></div>
    </div>

    <!-- Loading -->
    <div class="player-loading" id="playerLoading">
        <div class="spinner"></div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const channel = new BroadcastChannel('freemusic_player');

        const SOURCE_LABELS = {
            netease: '网易云',
            tencent: 'QQ音乐',
            kuwo: '酷我',
            audius: 'Audius',
        };

        let currentTrack = null;
        let playlist = [];
        let currentPlaylistIndex = -1;
        let playMode = 0; // 0=顺序 1=单曲循环 2=随机
        const MODE_ICONS = ['🔁', '🔂', '🔀'];
        const MODE_TIPS = ['顺序播放', '单曲循环', '随机播放'];
        let liked = false;
        let isDragging = false;

        // ===== 工具函数 =====
        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function setStatus(msg) {
            document.title = msg ? msg + ' | FreeMusic' : 'FreeMusic';
        }

        function showPlayerLoading() {
            document.getElementById('playerLoading').classList.add('active');
        }

        function hidePlayerLoading() {
            document.getElementById('playerLoading').classList.remove('active');
        }

        // ===== 唱片控制 =====
        function setDiscPlaying(playing) {
            const disc = document.getElementById('disc');
            const needle = document.getElementById('needle');
            if (playing) {
                disc.classList.add('spinning');
                needle.classList.add('playing');
            } else {
                disc.classList.remove('spinning');
                needle.classList.remove('playing');
            }
        }

        // ===== 更新歌曲UI =====
        function updateTrackUI(track) {
            if (!track) return;
            currentTrack = track;
            document.getElementById('playerTitle').textContent = track.title || '未知';
            document.getElementById('playerArtist').textContent = track.artist || '-';
            document.getElementById('playerSource').textContent = SOURCE_LABELS[track.source] || track.source || '-';
            document.getElementById('topTitle').textContent = track.title || '-';

            // 封面
            const coverEl = document.getElementById('discCover');
            if (track.pic) {
                coverEl.innerHTML = '<img src="' + escapeHtml(track.pic) + '" onerror="this.parentElement.innerHTML=\'<div class=disc-cover-placeholder>🎵</div>\'">';
                // 背景模糊
                const bgImg = document.getElementById('bgImg');
                bgImg.src = track.pic;
                bgImg.style.display = 'block';
            } else {
                coverEl.innerHTML = '<div class="disc-cover-placeholder">🎵</div>';
                document.getElementById('bgImg').style.display = 'none';
            }

            // 重置喜欢状态
            liked = false;
            const likeIcon = document.getElementById('likeBtn').querySelector('.icon');
            likeIcon.textContent = '♡';
            likeIcon.style.color = '';

            document.title = track.title + ' - ' + track.artist + ' | FreeMusic';
        }

        // ===== 播放控制 =====
        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // ===== 进度条 =====
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressThumb = document.getElementById('progressThumb');

        function seekToPosition(e) {
            const rect = progressBar.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const ratio = Math.max(0, Math.min((clientX - rect.left) / rect.width, 1));
            if (audio.duration) {
                audio.currentTime = ratio * audio.duration;
            }
            progressFill.style.width = (ratio * 100) + '%';
            progressThumb.style.left = (ratio * 100) + '%';
        }

        progressBar.addEventListener('mousedown', function(e) {
            isDragging = true;
            progressBar.classList.add('dragging');
            seekToPosition(e);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) seekToPosition(e);
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                progressBar.classList.remove('dragging');
            }
        });

        progressBar.addEventListener('touchstart', function(e) {
            isDragging = true;
            progressBar.classList.add('dragging');
            seekToPosition(e);
        }, { passive: true });

        progressBar.addEventListener('touchmove', function(e) {
            if (isDragging) seekToPosition(e);
        }, { passive: true });

        progressBar.addEventListener('touchend', function() {
            isDragging = false;
            progressBar.classList.remove('dragging');
        });

        // ===== 音频事件 =====
        audio.addEventListener('timeupdate', () => {
            if (isDragging) return;
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = pct + '%';
                progressThumb.style.left = pct + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            document.getElementById('playBtn').textContent = '▶';
            setDiscPlaying(false);
            sendCmd('ended');
        });

        audio.addEventListener('play', () => {
            document.getElementById('playBtn').textContent = '⏸';
            setDiscPlaying(true);
        });

        audio.addEventListener('pause', () => {
            document.getElementById('playBtn').textContent = '▶';
            setDiscPlaying(false);
        });

        audio.addEventListener('error', () => {
            hidePlayerLoading();
            document.getElementById('playBtn').textContent = '▶';
            setDiscPlaying(false);
            setStatus('播放出错，请尝试下一首');
        });

        // ===== 播放模式 =====
        function togglePlayMode() {
            playMode = (playMode + 1) % 3;
            const btn = document.getElementById('modeBtn');
            btn.textContent = MODE_ICONS[playMode];
            btn.classList.toggle('active', playMode !== 0);
            // 通知主页面
            channel.postMessage({ type: 'cmd', cmd: 'mode', mode: playMode });
        }

        // ===== 音量 =====
        function toggleVolume() {
            const wrap = document.getElementById('volumeWrap');
            wrap.classList.toggle('show');
        }

        function setVolume(val) {
            audio.volume = val / 100;
        }

        audio.volume = 0.8;

        // 点击其他地方关闭音量
        document.addEventListener('click', function(e) {
            const wrap = document.getElementById('volumeWrap');
            if (wrap.classList.contains('show') && !wrap.contains(e.target) && !e.target.closest('.vol-btn')) {
                wrap.classList.remove('show');
            }
        });

        // ===== 喜欢 =====
        function toggleLike() {
            liked = !liked;
            const icon = document.getElementById('likeBtn').querySelector('.icon');
            icon.textContent = liked ? '♥' : '♡';
            if (liked) {
                icon.style.color = 'var(--accent)';
            } else {
                icon.style.color = '';
            }
        }

        // ===== 播放列表 =====
        function togglePlaylist() {
            const drawer = document.getElementById('playlistDrawer');
            const overlay = document.getElementById('drawerOverlay');
            const isShow = drawer.classList.contains('show');
            if (isShow) {
                drawer.classList.remove('show');
                overlay.classList.remove('show');
            } else {
                drawer.classList.add('show');
                overlay.classList.add('show');
            }
        }

        function updatePlaylistUI() {
            const list = document.getElementById('playlistList');
            const countEl = document.getElementById('playlistCount');
            countEl.textContent = playlist.length + '首';

            list.innerHTML = playlist.map((t, i) => {
                const isActive = i === currentPlaylistIndex;
                return '<div class="drawer-item' + (isActive ? ' active' : '') + '" onclick="playFromPlaylist(' + i + ')">' +
                    '<div class="item-index">' + (isActive ? '♫' : (i+1)) + '</div>' +
                    '<div class="item-info">' +
                        '<div class="item-title">' + escapeHtml(t.title || '未知') + '</div>' +
                        '<div class="item-artist">' + escapeHtml(t.artist || '-') + '</div>' +
                    '</div>' +
                    '<span class="item-source">' + (SOURCE_LABELS[t.source] || t.source || '-') + '</span>' +
                '</div>';
            }).join('');
        }

        function playFromPlaylist(index) {
            channel.postMessage({ type: 'cmd', cmd: 'playIndex', index: index });
        }

        // ===== 通信 =====
        function sendCmd(cmd) {
            channel.postMessage({ type: 'cmd', cmd: cmd });
        }

        function goBack() {
            channel.postMessage({ type: 'cmd', cmd: 'back' });
            window.close();
        }

        channel.onmessage = (event) => {
            const msg = event.data;

            if (msg.type === 'play') {
                updateTrackUI(msg.track);
                progressFill.style.width = '0%';
                progressThumb.style.left = '0%';
                document.getElementById('currentTime').textContent = '0:00';
                document.getElementById('totalTime').textContent = formatTime(msg.track.duration);
                showPlayerLoading();

                audio.src = msg.url;
                audio.play().then(() => {
                    hidePlayerLoading();
                }).catch(e => {
                    hidePlayerLoading();
                });
            }

            if (msg.type === 'updateTrack') {
                updateTrackUI(msg.track);
            }

            if (msg.type === 'status') {
                setStatus(msg.text);
            }

            // 接收播放列表
            if (msg.type === 'playlist') {
                playlist = msg.tracks || [];
                currentPlaylistIndex = msg.currentIndex >= 0 ? msg.currentIndex : -1;
                updatePlaylistUI();
            }
        };

        // 通知主页面播放器已就绪
        channel.postMessage({ type: 'playerReady' });

        // ===== 滑动手势切歌 =====
        (function() {
            let startX = 0, startY = 0, swiping = false;
            document.addEventListener('touchstart', function(e) {
                if (e.target.closest('.playlist-drawer') || e.target.closest('.volume-slider-wrap')) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                swiping = true;
            }, { passive: true });

            document.addEventListener('touchend', function(e) {
                if (!swiping) return;
                swiping = false;
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx > 0) {
                        sendCmd('prev');
                    } else {
                        sendCmd('next');
                    }
                }
            }, { passive: true });
        })();
    </script>
</body>
</html>
